<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Asura Bot — Rinhas de Galos no Discord</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f4f1fb;
    --bg-2: #efeaf7;
    --surface: #ffffff;
    --ink: #14101f;
    --ink-2: #4a4459;
    --ink-3: #7b758a;
    --line: #e6e0f0;
    --line-2: #d8d0e7;

    --primary: #6938ef;      /* asura purple */
    --primary-deep: #4a1fd1;
    --primary-soft: #ede5ff;
    --primary-ink: #2a1373;

    --amber: #f0a500;        /* royal accent */
    --amber-soft: #fff2cc;
    --emerald: #14a87a;      /* prime accent */
    --emerald-soft: #d8f3e6;
    --rose: #e23d6b;

    --radius-sm: 10px;
    --radius: 16px;
    --radius-lg: 22px;
    --radius-xl: 28px;

    --shadow-sm: 0 1px 2px rgba(20,16,31,.04), 0 1px 1px rgba(20,16,31,.03);
    --shadow: 0 8px 28px -10px rgba(64,40,140,.16), 0 2px 6px -2px rgba(20,16,31,.04);
    --shadow-lg: 0 30px 60px -20px rgba(64,40,140,.28), 0 8px 20px -10px rgba(20,16,31,.08);

    --font-display: "Bricolage Grotesque", system-ui, sans-serif;
    --font-body: "Hanken Grotesk", system-ui, sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  body {
    background:
      radial-gradient(1200px 600px at 80% -100px, rgba(105,56,239,.10), transparent 60%),
      radial-gradient(900px 500px at -10% 30%, rgba(240,165,0,.06), transparent 60%),
      var(--bg);
    min-height: 100vh;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; }

  ::selection { background: var(--primary); color: #fff; }

  /* utility */
  .container { width: 100%; max-width: 1240px; margin: 0 auto; padding: 0 28px; }

  .eyebrow {
    font-family: var(--font-mono);
    font-size: 12px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--primary); font-weight: 600;
  }

  .h-display {
    font-family: var(--font-display);
    font-weight: 700;
    letter-spacing: -0.025em;
    line-height: 1.02;
    color: var(--ink);
  }

  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 999px;
    font-size: 12px; font-weight: 600;
    background: var(--primary-soft); color: var(--primary-ink);
    border: 1px solid #d9c9ff;
  }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 12px 20px; border-radius: 999px;
    font-weight: 600; font-size: 14px;
    border: 1px solid transparent;
    transition: transform .15s ease, box-shadow .2s ease, background .2s;
  }
  .btn-primary {
    background: linear-gradient(180deg, #7a4af5 0%, #5a25e0 100%);
    color: #fff;
    box-shadow: 0 8px 20px -8px rgba(105,56,239,.6), inset 0 1px 0 rgba(255,255,255,.18);
  }
  .btn-primary:hover { transform: translateY(-1px); }
  .btn-ghost {
    background: #fff;
    border-color: var(--line-2);
    color: var(--ink);
  }
  .btn-ghost:hover { border-color: var(--primary); color: var(--primary); }
  .btn-dark {
    background: var(--ink); color: #fff;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm);
  }

  /* Scroll fade on nav */
  .scrolled { background: rgba(244,241,251,.85) !important; backdrop-filter: blur(14px); border-bottom: 1px solid var(--line); }

  /* Discord brand color */
  .discord { background: #5865F2; color: #fff; }

  /* Section spacing */
  .section { padding: 96px 0; }
  .section-tight { padding: 64px 0; }

  /* Loading splash */
  #root:empty::after {
    content: "Carregando…";
    display: grid; place-items: center;
    min-height: 100vh;
    color: var(--ink-3); font-family: var(--font-mono); font-size: 12px;
  }

  /* Hide scrollbar on horizontal scroller */
  .h-scroll { overflow-x: auto; scrollbar-width: none; }
  .h-scroll::-webkit-scrollbar { display: none; }

  /* type util */
  .mono { font-family: var(--font-mono); }
  .muted { color: var(--ink-3); }
  .ink-2 { color: var(--ink-2); }

  /* Animated underline */
  .nav-link {
    position: relative;
    padding: 8px 4px;
    font-weight: 500;
    color: var(--ink-2);
    font-size: 14px;
  }
  .nav-link:hover { color: var(--ink); }
  .nav-link.active { color: var(--ink); font-weight: 600; }
  .nav-link.active::after {
    content: ""; position: absolute; left: 4px; right: 4px; bottom: 0;
    height: 2px; background: var(--primary); border-radius: 2px;
  }

  /* Chip */
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 10px; border-radius: 999px;
    font-size: 12px; font-weight: 600;
    background: #fff; border: 1px solid var(--line-2); color: var(--ink-2);
  }

  /* Mock command */
  .cmd {
    font-family: var(--font-mono); font-weight: 500;
    background: #efeaf7; color: var(--primary-ink);
    padding: 3px 8px; border-radius: 6px; font-size: 13px;
    border: 1px solid #ddd2f3;
  }

  /* Stat ring (decorative) */
  .ring { aspect-ratio: 1; border-radius: 999px; border: 1px dashed var(--line-2); }

  /* Rarity tags */
  .rarity-Comum    { --r:#9ca3af; }
  .rarity-Raro     { --r:#3b82f6; }
  .rarity-Épico    { --r:#a855f7; }
  .rarity-Lendário { --r:#f59e0b; }
  .rarity-Mítico   { --r:#ef4444; }
  .rarity-Sagrado  { --r:#14b8a6; }
  .rarity-Divino   { --r:#fbbf24; }

  /* MOBILE */
  @media (max-width: 768px) {
    .container { padding: 0 18px; }
    .section { padding: 56px 0; }
    .section-tight { padding: 40px 0; }
    .h-display { letter-spacing: -0.02em; }
    /* Force any inline grid using inline-style to wrap via this class */
    .m-stack { display: flex !important; flex-direction: column !important; }
    .m-2col  { grid-template-columns: repeat(2, 1fr) !important; }
    .m-1col  { grid-template-columns: 1fr !important; }
    .m-hide  { display: none !important; }
    .m-pad   { padding: 24px !important; }
    .m-pad-sm{ padding: 20px !important; }
    .m-gap   { gap: 12px !important; }
    .m-h1    { font-size: 38px !important; }
    .m-h2    { font-size: 32px !important; }
    .m-h3    { font-size: 22px !important; }
    .m-body  { font-size: 15px !important; }
    .m-fullw { width: 100% !important; }
    .m-center{ text-align: center !important; }
    .m-col   { flex-direction: column !important; }
    .m-wrap  { flex-wrap: wrap !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="i18n.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="page-home.jsx"></script>
<script type="text/babel" src="page-galos.jsx"></script>
<script type="text/babel" src="page-galo.jsx"></script>
<script type="text/babel" src="page-apoiar.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
